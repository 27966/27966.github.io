<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="Styles\Main.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <div class="navbar"> </div>
    <title>Team 27966</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: url('hero-placeholder.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }

        /* Dark overlay for readability */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 85, 255, 0.59);
        }

        .hero-text {
            position: relative;
            z-index: 1;
            color: rgb(255, 255, 255);
            font-weight: bold;
        }

        .hero-text h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 4px;
            font-weight: 800;
            color: rgb(255, 255, 255);
        }

        .hero-text p {
            font-size: 1.5rem;
            margin-top: 10px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: #111;
            color: #fff;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-text">
            <h1>TEAM 27966</h1>
            <p>KNIGHTS OF THE LOOP FUNCTION</p>
        </div>
    </section>

    <footer>
        © 2026 Team 27966 Robotics
    </footer>

</body>
</html>
